services:
  db:
    image: postgres:16-alpine
    container_name: dayframe-postgres
    environment:
      POSTGRES_DB: dayframe
      POSTGRES_USER: dayframe
      POSTGRES_PASSWORD: dayframe
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dayframe -d dayframe"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - dayframe-postgres-data:/var/lib/postgresql/data

volumes:
  dayframe-postgres-data:
